name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions (diagnostic)
        run: ls /Applications | grep Xcode

      - name: Select latest available Xcode
        run: sudo xcode-select -s /Applications/Xcode.app && xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Secrets.xcconfig (empty — no server configured, fully local)
        run: |
          cat > ios/OpenWhoop/Config/Secrets.xcconfig << 'EOF'
          WHOOP_BASE_URL =
          WHOOP_API_KEY =
          WHOOP_DEVICE_ID = my-whoop
          EOF

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build (no signing — just checking it compiles)
        run: |
          cd ios
          xcodebuild build \
            -project OpenWhoop.xcodeproj \
            -scheme OpenWhoop \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Archive for a real device (still unsigned)
        run: |
          cd ios
          xcodebuild archive \
            -project OpenWhoop.xcodeproj \
            -scheme OpenWhoop \
            -configuration Release \
            -archivePath build/OpenWhoop.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package the .ipa (Payload/OpenWhoop.app zipped)
        run: |
          cd ios/build
          mkdir Payload
          cp -r OpenWhoop.xcarchive/Products/Applications/OpenWhoop.app Payload/
          zip -r OpenWhoop.ipa Payload

      - name: Upload .ipa as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWhoop-ipa
          path: ios/build/OpenWhoop.ipa
